<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantLab - Backtest Dashboard</title>
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: #1a2035;
            --bg-input: #1e2a42;
            --border: #2a3a5c;
            --accent: #00d2ff;
            --accent-glow: rgba(0, 210, 255, 0.15);
            --red: #e94560;
            --green: #10b981;
            --yellow: #fbbf24;
            --purple: #a855f7;
            --text: #e5e7eb;
            --text-dim: #9ca3af;
            --text-bright: #f9fafb;
            --radius: 10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
            background: var(--bg-primary);
            color: var(--text);
            min-height: 100vh;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }
        .header h1 {
            font-size: 20px;
            color: var(--accent);
            font-weight: 700;
            letter-spacing: 2px;
        }
        .header h1 span { color: var(--text-dim); font-weight: 400; }
        .header-actions { display: flex; gap: 10px; }

        /* Layout */
        .container {
            display: grid;
            grid-template-columns: 320px 1fr;
            min-height: calc(100vh - 57px);
        }

        /* Sidebar */
        .sidebar {
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            padding: 20px;
            overflow-y: auto;
        }
        .sidebar h2 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-dim);
            margin-bottom: 12px;
        }

        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 11px;
            color: var(--text-dim);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 8px 12px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
            outline: none;
            transition: border 0.2s;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }
        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        /* Strategy checkboxes */
        .strategy-list { display: flex; flex-direction: column; gap: 6px; }
        .strategy-item {
            display: flex; align-items: center; gap: 8px;
            padding: 6px 10px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
            font-size: 12px;
        }
        .strategy-item:hover { border-color: var(--accent); }
        .strategy-item.selected { border-color: var(--accent); background: var(--accent-glow); }
        .strategy-item input[type=checkbox] { accent-color: var(--accent); }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.5px;
        }
        .btn-primary {
            background: var(--accent);
            color: #000;
            width: 100%;
        }
        .btn-primary:hover { filter: brightness(1.15); transform: translateY(-1px); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-secondary {
            background: var(--bg-input);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover { border-color: var(--accent); }
        .btn-download {
            background: var(--green);
            color: #000;
        }
        .btn-download:hover { filter: brightness(1.15); }

        /* Main content */
        .main { padding: 24px; overflow-y: auto; }

        /* Welcome state */
        .welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 60vh;
            text-align: center;
        }
        .welcome h2 { font-size: 28px; color: var(--text-bright); margin-bottom: 8px; }
        .welcome p { color: var(--text-dim); font-size: 14px; }

        /* Loading */
        .loading {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 60vh;
        }
        .spinner {
            width: 48px; height: 48px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading p { margin-top: 16px; color: var(--text-dim); font-size: 13px; }

        /* Results */
        .results { display: none; }

        /* Summary cards */
        .summary-bar {
            display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
        }
        .summary-card {
            flex: 1; min-width: 140px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 16px;
        }
        .summary-card .label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        .summary-card .value { font-size: 22px; font-weight: 700; margin-top: 4px; }
        .positive { color: var(--green); }
        .negative { color: var(--red); }

        /* Tabs */
        .tabs {
            display: flex; gap: 0; margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        .tab {
            padding: 10px 20px;
            font-size: 12px;
            color: var(--text-dim);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .tab:hover { color: var(--text); }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Comparison table */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            margin-bottom: 20px;
        }
        .data-table th {
            background: var(--bg-input);
            padding: 10px 14px;
            text-align: left;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            border-bottom: 1px solid var(--border);
        }
        .data-table td {
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
        }
        .data-table tr:hover td { background: rgba(0,210,255,0.03); }

        /* Chart container */
        .chart-section { margin-bottom: 24px; }
        .chart-section h3 {
            font-size: 13px; color: var(--text-dim);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .chart-img {
            width: 100%;
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }
        .chart-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        @media (max-width: 1200px) {
            .chart-grid { grid-template-columns: 1fr; }
        }

        /* Strategy detail cards */
        .strategy-detail {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 20px;
        }
        .strategy-detail h3 {
            font-size: 16px; color: var(--accent);
            margin-bottom: 16px; text-transform: none; letter-spacing: 0;
        }

        /* Metrics grid */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        .metric-item {
            background: var(--bg-input);
            border-radius: 6px;
            padding: 10px 12px;
        }
        .metric-item .metric-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; }
        .metric-item .metric-value { font-size: 15px; font-weight: 600; margin-top: 2px; }

        /* Trades table */
        .trades-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
        }
        .trades-table th {
            background: var(--bg-input);
            padding: 8px 10px;
            text-align: center;
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-dim);
        }
        .trades-table td {
            padding: 6px 10px;
            text-align: center;
            border-bottom: 1px solid rgba(42,58,92,0.5);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .divider { height: 1px; background: var(--border); margin: 20px 0; }
    </style>
</head>
<body>
    <div class="header">
        <h1>QUANTLAB <span>/ Backtest Dashboard</span></h1>
        <div class="header-actions">
            <button class="btn btn-download" id="btnDownloadPdf" style="display:none" onclick="downloadPdf()">
                Download PDF Report
            </button>
        </div>
    </div>

    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <h2>Configuration</h2>

            <div class="form-group">
                <label>Symbol</label>
                <input type="text" id="symbol" value="AAPL" placeholder="AAPL, BTC/USDT...">
            </div>

            <div class="row-2">
                <div class="form-group">
                    <label>Start Date</label>
                    <input type="date" id="startDate" value="2023-01-01">
                </div>
                <div class="form-group">
                    <label>End Date</label>
                    <input type="date" id="endDate" value="2025-12-31">
                </div>
            </div>

            <div class="row-2">
                <div class="form-group">
                    <label>Capital ($)</label>
                    <input type="number" id="capital" value="100000">
                </div>
                <div class="form-group">
                    <label>Commission</label>
                    <input type="number" id="commission" value="0.001" step="0.0001">
                </div>
            </div>

            <div class="form-group">
                <label>Benchmark</label>
                <input type="text" id="benchmark" value="SPY" placeholder="SPY, QQQ...">
            </div>

            <div class="divider"></div>

            <h2>Strategies</h2>
            <div class="strategy-list" id="strategyList">
                <!-- Filled by JS -->
            </div>

            <div class="divider"></div>

            <button class="btn btn-primary" id="btnRun" onclick="runBacktest()">
                RUN BACKTEST
            </button>

            <div id="statusText" style="margin-top:10px; font-size:11px; color:var(--text-dim); text-align:center;"></div>
        </div>

        <!-- Main -->
        <div class="main">
            <div class="welcome" id="welcome">
                <h2>Ready to backtest</h2>
                <p>Configure your parameters and strategies, then hit Run Backtest.</p>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Running backtest...</p>
            </div>

            <div class="results" id="results">
                <!-- Summary -->
                <div class="summary-bar" id="summaryBar"></div>

                <!-- Tabs -->
                <div class="tabs" id="tabs"></div>

                <!-- Tab: Overview -->
                <div class="tab-content active" id="tab-overview">
                    <div class="chart-section" id="comparisonChart"></div>
                    <table class="data-table" id="comparisonTable"></table>
                </div>

                <!-- Tab: per-strategy details (dynamically added) -->
            </div>
        </div>
    </div>

<script>
let strategiesData = [];
let backtestData = null;

// Load strategies on init
async function init() {
    const res = await fetch('/api/strategies');
    strategiesData = await res.json();
    const list = document.getElementById('strategyList');
    list.innerHTML = strategiesData.map((s, i) => `
        <label class="strategy-item selected" onclick="this.classList.toggle('selected')">
            <input type="checkbox" value="${s.name}" checked>
            ${s.name}
        </label>
    `).join('');
}

function getSelectedStrategies() {
    return [...document.querySelectorAll('#strategyList input:checked')].map(el => el.value);
}

async function runBacktest() {
    const btn = document.getElementById('btnRun');
    const status = document.getElementById('statusText');
    btn.disabled = true;
    btn.textContent = 'RUNNING...';
    status.textContent = '';

    document.getElementById('welcome').style.display = 'none';
    document.getElementById('results').style.display = 'none';
    document.getElementById('loading').style.display = 'flex';

    const strategies = getSelectedStrategies();
    if (strategies.length === 0) {
        status.textContent = 'Select at least one strategy.';
        btn.disabled = false;
        btn.textContent = 'RUN BACKTEST';
        document.getElementById('loading').style.display = 'none';
        document.getElementById('welcome').style.display = 'flex';
        return;
    }

    try {
        const res = await fetch('/api/backtest', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                symbol: document.getElementById('symbol').value,
                start: document.getElementById('startDate').value,
                end: document.getElementById('endDate').value,
                capital: document.getElementById('capital').value,
                commission: document.getElementById('commission').value,
                benchmark: document.getElementById('benchmark').value,
                strategies: strategies,
            }),
        });

        const data = await res.json();
        if (data.error) throw new Error(data.error);

        backtestData = data;
        renderResults(data);

        document.getElementById('loading').style.display = 'none';
        document.getElementById('results').style.display = 'block';
        document.getElementById('btnDownloadPdf').style.display = 'inline-block';
        status.textContent = `Done. ${data.bars} bars processed.`;
    } catch (err) {
        status.textContent = 'Error: ' + err.message;
        document.getElementById('loading').style.display = 'none';
        document.getElementById('welcome').style.display = 'flex';
    }

    btn.disabled = false;
    btn.textContent = 'RUN BACKTEST';
}

function renderResults(data) {
    // Find best strategy
    const best = data.results.reduce((a, b) =>
        a.metrics.total_return > b.metrics.total_return ? a : b
    );
    const bestSharpe = data.results.reduce((a, b) =>
        a.metrics.sharpe_ratio > b.metrics.sharpe_ratio ? a : b
    );

    // Summary bar
    document.getElementById('summaryBar').innerHTML = `
        <div class="summary-card">
            <div class="label">Symbol</div>
            <div class="value" style="color:var(--accent)">${data.symbol}</div>
        </div>
        <div class="summary-card">
            <div class="label">Best Return</div>
            <div class="value ${best.metrics.total_return >= 0 ? 'positive' : 'negative'}">
                ${(best.metrics.total_return * 100).toFixed(1)}%
            </div>
            <div class="label">${best.strategy}</div>
        </div>
        <div class="summary-card">
            <div class="label">Best Sharpe</div>
            <div class="value ${bestSharpe.metrics.sharpe_ratio >= 0 ? 'positive' : 'negative'}">
                ${bestSharpe.metrics.sharpe_ratio.toFixed(2)}
            </div>
            <div class="label">${bestSharpe.strategy}</div>
        </div>
        <div class="summary-card">
            <div class="label">Period</div>
            <div class="value" style="font-size:14px; color:var(--text)">${data.period}</div>
        </div>
        <div class="summary-card">
            <div class="label">Strategies</div>
            <div class="value" style="color:var(--purple)">${data.results.length}</div>
        </div>
    `;

    // Tabs
    let tabsHtml = `<div class="tab active" onclick="switchTab('overview')">Overview</div>`;
    data.results.forEach(r => {
        const id = r.strategy.replace(/\s+/g, '-').toLowerCase();
        tabsHtml += `<div class="tab" onclick="switchTab('${id}')">${r.strategy}</div>`;
    });
    document.getElementById('tabs').innerHTML = tabsHtml;

    // Overview tab: comparison chart + table
    let overviewHtml = '';
    if (data.charts.comparison) {
        overviewHtml += `
            <div class="chart-section">
                <h3>Strategy Comparison</h3>
                <img class="chart-img" src="data:image/png;base64,${data.charts.comparison}">
            </div>`;
    }
    document.getElementById('comparisonChart').innerHTML = overviewHtml;

    // Comparison table
    let tableHtml = `<thead><tr>
        <th>Strategy</th><th>Return</th><th>CAGR</th><th>Sharpe</th>
        <th>Sortino</th><th>Max DD</th><th>Win Rate</th><th>Profit Factor</th>
        <th>Trades</th><th>VaR 95%</th><th>Alpha</th>
    </tr></thead><tbody>`;
    data.results.forEach(r => {
        const m = r.metrics;
        tableHtml += `<tr>
            <td style="color:var(--accent)">${r.strategy}</td>
            <td class="${m.total_return >= 0 ? 'positive' : 'negative'}">${(m.total_return*100).toFixed(1)}%</td>
            <td class="${m.cagr >= 0 ? 'positive' : 'negative'}">${(m.cagr*100).toFixed(1)}%</td>
            <td class="${m.sharpe_ratio >= 0 ? 'positive' : 'negative'}">${m.sharpe_ratio.toFixed(2)}</td>
            <td class="${m.sortino_ratio >= 0 ? 'positive' : 'negative'}">${m.sortino_ratio.toFixed(2)}</td>
            <td class="negative">${(m.max_drawdown*100).toFixed(1)}%</td>
            <td>${(m.win_rate*100).toFixed(0)}%</td>
            <td>${m.profit_factor.toFixed(2)}</td>
            <td>${m.total_trades}</td>
            <td>${(m.var_95*100).toFixed(2)}%</td>
            <td class="${m.alpha >= 0 ? 'positive' : 'negative'}">${(m.alpha*100).toFixed(1)}%</td>
        </tr>`;
    });
    tableHtml += '</tbody>';
    document.getElementById('comparisonTable').innerHTML = tableHtml;

    // Per-strategy detail tabs
    // Remove old strategy tabs
    document.querySelectorAll('.tab-content.strategy-tab').forEach(el => el.remove());

    data.results.forEach(r => {
        const id = r.strategy.replace(/\s+/g, '-').toLowerCase();
        const m = r.metrics;

        const metricsHtml = [
            ['Total Return', `${(m.total_return*100).toFixed(2)}%`, m.total_return >= 0],
            ['CAGR', `${(m.cagr*100).toFixed(2)}%`, m.cagr >= 0],
            ['Sharpe', m.sharpe_ratio.toFixed(2), m.sharpe_ratio >= 0],
            ['Sortino', m.sortino_ratio.toFixed(2), m.sortino_ratio >= 0],
            ['Calmar', m.calmar_ratio.toFixed(2), m.calmar_ratio >= 0],
            ['Volatility', `${(m.volatility*100).toFixed(1)}%`, true],
            ['Max Drawdown', `${(m.max_drawdown*100).toFixed(1)}%`, false],
            ['Max DD Days', `${m.max_drawdown_duration_days}d`, true],
            ['Win Rate', `${(m.win_rate*100).toFixed(0)}%`, m.win_rate >= 0.5],
            ['Profit Factor', m.profit_factor.toFixed(2), m.profit_factor >= 1],
            ['Total Trades', m.total_trades, true],
            ['Avg Trade', `${(m.avg_trade_pnl*100).toFixed(2)}%`, m.avg_trade_pnl >= 0],
            ['Avg Win', `${(m.avg_win*100).toFixed(2)}%`, true],
            ['Avg Loss', `${(m.avg_loss*100).toFixed(2)}%`, false],
            ['Best Trade', `${(m.best_trade*100).toFixed(2)}%`, true],
            ['Worst Trade', `${(m.worst_trade*100).toFixed(2)}%`, false],
            ['Avg Hold', `${m.avg_holding_days.toFixed(1)}d`, true],
            ['VaR 95%', `${(m.var_95*100).toFixed(2)}%`, false],
            ['CVaR 95%', `${(m.cvar_95*100).toFixed(2)}%`, false],
            ['Alpha', `${(m.alpha*100).toFixed(2)}%`, m.alpha >= 0],
            ['Beta', m.beta.toFixed(2), true],
        ].map(([label, value, positive]) => `
            <div class="metric-item">
                <div class="metric-label">${label}</div>
                <div class="metric-value ${positive ? 'positive' : 'negative'}">${value}</div>
            </div>
        `).join('');

        // Trades table
        let tradesHtml = '';
        if (r.trades.length > 0) {
            tradesHtml = `<table class="trades-table">
                <thead><tr><th>#</th><th>Entry</th><th>Exit</th><th>Side</th>
                <th>Entry $</th><th>Exit $</th><th>P&L %</th><th>Days</th></tr></thead><tbody>`;
            r.trades.forEach((t, i) => {
                tradesHtml += `<tr>
                    <td>${i+1}</td>
                    <td>${t.entry_date}</td><td>${t.exit_date}</td>
                    <td style="color:${t.side==='LONG' ? 'var(--green)' : 'var(--red)'}">${t.side}</td>
                    <td>${t.entry_price}</td><td>${t.exit_price}</td>
                    <td class="${t.pnl_pct >= 0 ? 'positive' : 'negative'}">${t.pnl_pct.toFixed(2)}%</td>
                    <td>${t.duration_days}</td>
                </tr>`;
            });
            tradesHtml += '</tbody></table>';
        }

        const eqKey = `${r.strategy}_equity`;
        const ddKey = `${r.strategy}_drawdown`;
        const mrKey = `${r.strategy}_monthly`;
        const tdKey = `${r.strategy}_trades`;

        const tabDiv = document.createElement('div');
        tabDiv.className = 'tab-content strategy-tab';
        tabDiv.id = `tab-${id}`;
        tabDiv.innerHTML = `
            <div class="strategy-detail">
                <h3>${r.strategy}</h3>
                <div style="font-size:11px;color:var(--text-dim);margin-bottom:16px;">
                    Params: ${Object.entries(r.params).map(([k,v]) => `${k}=${v}`).join(' | ')}
                </div>
                <div class="metrics-grid">${metricsHtml}</div>
            </div>

            <div class="chart-grid">
                <div class="chart-section">
                    <h3>Equity Curve</h3>
                    ${data.charts[eqKey] ? `<img class="chart-img" src="data:image/png;base64,${data.charts[eqKey]}">` : ''}
                </div>
                <div class="chart-section">
                    <h3>Drawdown</h3>
                    ${data.charts[ddKey] ? `<img class="chart-img" src="data:image/png;base64,${data.charts[ddKey]}">` : ''}
                </div>
            </div>
            <div class="chart-grid">
                <div class="chart-section">
                    <h3>Monthly Returns</h3>
                    ${data.charts[mrKey] ? `<img class="chart-img" src="data:image/png;base64,${data.charts[mrKey]}">` : ''}
                </div>
                <div class="chart-section">
                    <h3>Trade Distribution</h3>
                    ${data.charts[tdKey] ? `<img class="chart-img" src="data:image/png;base64,${data.charts[tdKey]}">` : ''}
                </div>
            </div>

            ${tradesHtml ? `
                <div class="strategy-detail" style="margin-top:20px">
                    <h3>Trade Log</h3>
                    ${tradesHtml}
                </div>
            ` : ''}
        `;
        document.getElementById('results').appendChild(tabDiv);
    });
}

function switchTab(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));

    const tabId = name === 'overview' ? 'tab-overview' : `tab-${name}`;
    document.getElementById(tabId).classList.add('active');

    // Find and activate the tab button
    document.querySelectorAll('.tab').forEach(t => {
        const tabName = t.textContent.trim().replace(/\s+/g, '-').toLowerCase();
        if (tabName === name || (name === 'overview' && t.textContent.trim() === 'Overview')) {
            t.classList.add('active');
        }
    });
}

async function downloadPdf() {
    const btn = document.getElementById('btnDownloadPdf');
    btn.textContent = 'Generating...';
    btn.disabled = true;

    try {
        const res = await fetch('/api/download-pdf', { method: 'POST' });
        if (!res.ok) {
            const err = await res.json();
            throw new Error(err.error);
        }
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `backtest_report_${new Date().toISOString().slice(0,10)}.pdf`;
        a.click();
        URL.revokeObjectURL(url);
    } catch (err) {
        alert('PDF download failed: ' + err.message);
    }

    btn.textContent = 'Download PDF Report';
    btn.disabled = false;
}

init();
</script>
</body>
